<!DOCTYPE html>
<!--
  ============================================================
  JavaScript – Operadores
  Conceito: operadores realizam operações sobre valores
  (operandos) e retornam um resultado.

  Categorias:
    1. Aritméticos
    2. Atribuição
    3. Comparação
    4. Lógicos
    5. Ternário
    6. Outros (typeof, in, instanceof, nullish coalescing)
  ============================================================
-->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02 – Operadores (JS)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; max-width: 820px; margin: 2rem auto;
           padding: 0 1rem; line-height: 1.7; color: #333; background: #f8fafc; }
    h1 { color: #2563eb; margin-bottom: 0.5rem; }
    h2 { color: #1e40af; border-bottom: 2px solid #bfdbfe;
         padding-bottom: 0.25rem; margin: 1.5rem 0 0.75rem; }
    .saida {
      background: #1e293b; color: #f1f5f9; font-family: monospace;
      padding: 1rem; border-radius: 8px; white-space: pre-wrap;
      margin-bottom: 1rem; font-size: 0.9rem; min-height: 2rem;
    }
    button { background: #2563eb; color: #fff; border: none; padding: 0.5rem 1.2rem;
             border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-bottom: 0.5rem; }
    button:hover { background: #1d4ed8; }
    code { background: #f3f4f6; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.85rem; }
  </style>
</head>
<body>

  <h1>JavaScript – Operadores</h1>

  <h2>1. Operadores Aritméticos</h2>
  <button onclick="aritmeticos()">Executar</button>
  <div class="saida" id="saida-arit">Clique em "Executar"</div>

  <h2>2. Operadores de Atribuição</h2>
  <button onclick="atribuicao()">Executar</button>
  <div class="saida" id="saida-atrib">Clique em "Executar"</div>

  <h2>3. Operadores de Comparação</h2>
  <button onclick="comparacao()">Executar</button>
  <div class="saida" id="saida-comp">Clique em "Executar"</div>

  <h2>4. Operadores Lógicos</h2>
  <button onclick="logicos()">Executar</button>
  <div class="saida" id="saida-log">Clique em "Executar"</div>

  <h2>5. Operador Ternário e Outros</h2>
  <button onclick="outros()">Executar</button>
  <div class="saida" id="saida-outros">Clique em "Executar"</div>

  <script>
    function exibir(id, txt) {
      document.getElementById(id).textContent = txt;
    }

    // ============================================================
    //  1. OPERADORES ARITMÉTICOS
    // ============================================================
    function aritmeticos() {
      const a = 10, b = 3;
      let s = '';

      s += `a = ${a}, b = ${b}\n\n`;

      // + → adição
      s += `a + b  = ${a + b}    (adição)\n`;

      // - → subtração
      s += `a - b  = ${a - b}    (subtração)\n`;

      // * → multiplicação
      s += `a * b  = ${a * b}   (multiplicação)\n`;

      // / → divisão (sempre retorna float)
      s += `a / b  = ${a / b}333... (divisão)\n`;

      // % → módulo (resto da divisão inteira)
      s += `a % b  = ${a % b}    (módulo / resto)\n`;

      // ** → exponenciação (ES2016)
      s += `a ** b = ${a ** b}  (${a} elevado a ${b})\n`;

      // Precedência: assim como em Matemática, * e / antes de + e -
      s += `\n2 + 3 * 4       = ${2 + 3 * 4}   (* antes de +)\n`;
      s += `(2 + 3) * 4     = ${(2 + 3) * 4}  (parênteses mudam prioridade)\n`;

      // Incremento / Decremento
      let x = 5;
      s += `\nIncrementar x = ${x}:\n`;
      s += `x++  → ${x++} (pós-incremento: usa o valor, depois soma 1)\n`;
      s += `x agora é ${x}\n`;
      s += `++x  → ${++x} (pré-incremento: soma 1, depois usa o valor)\n`;
      s += `x agora é ${x}\n`;

      // Math: funções matemáticas embutidas
      s += '\nMath:\n';
      s += `Math.round(4.6) = ${Math.round(4.6)}   (arredonda)\n`;
      s += `Math.floor(4.9) = ${Math.floor(4.9)}   (arredonda para baixo)\n`;
      s += `Math.ceil(4.1)  = ${Math.ceil(4.1)}    (arredonda para cima)\n`;
      s += `Math.abs(-7)    = ${Math.abs(-7)}    (valor absoluto)\n`;
      s += `Math.sqrt(16)   = ${Math.sqrt(16)}    (raiz quadrada)\n`;
      s += `Math.pow(2, 8)  = ${Math.pow(2, 8)}  (potência)\n`;
      s += `Math.max(3,7,1) = ${Math.max(3, 7, 1)}    (maior valor)\n`;
      s += `Math.random()   = ${Math.random().toFixed(4)} (0 ≤ x < 1)\n`;

      exibir('saida-arit', s);
    }

    // ============================================================
    //  2. OPERADORES DE ATRIBUIÇÃO
    // ============================================================
    function atribuicao() {
      let s = '';
      let n = 10;
      s += `n = 10\n`;

      // = → atribuição simples
      // +=, -=, *=, /=, %= → atalhos: n += 5 equivale a n = n + 5
      n += 5;  s += `n += 5  → n = ${n}\n`;
      n -= 3;  s += `n -= 3  → n = ${n}\n`;
      n *= 2;  s += `n *= 2  → n = ${n}\n`;
      n /= 4;  s += `n /= 4  → n = ${n}\n`;
      n %= 3;  s += `n %= 3  → n = ${n}\n`;
      n **= 3; s += `n **= 3 → n = ${n}\n`;

      // Nullish assignment (ES2021)
      // ??= : atribui SOMENTE se o valor atual for null ou undefined
      let config = null;
      config ??= 'padrão';
      s += `\nconfig = null → config ??= "padrão" → "${config}"\n`;

      let titulo = 'Meu Site';
      titulo ??= 'padrão'; // não atribui (titulo não é null/undefined)
      s += `titulo = "Meu Site" → titulo ??= "padrão" → "${titulo}"\n`;

      exibir('saida-atrib', s);
    }

    // ============================================================
    //  3. OPERADORES DE COMPARAÇÃO
    // ============================================================
    function comparacao() {
      let s = '';

      // == e != → igualdade ABSTRATA (com coerção de tipo)
      // === e !== → igualdade ESTRITA (sem coerção — PREFIRA SEMPRE ===)
      s += '--- Igualdade Abstrata (==) vs Estrita (===) ---\n';
      s += `5 == "5"   → ${5 == '5'}   (coerção: "5" vira 5)\n`;
      s += `5 === "5"  → ${5 === '5'}  (tipos diferentes → false)\n`;
      s += `0 == false → ${0 == false}   (0 e false são ambos falsy)\n`;
      s += `0 === false→ ${0 === false}  (number ≠ boolean)\n`;
      s += `null == undefined → ${null == undefined}   (exceção especial)\n`;
      s += `null === undefined→ ${null === undefined}  (tipos diferentes)\n`;

      s += '\n--- Relacionais ---\n';
      const a = 10, b = 20;
      s += `a=${a}, b=${b}\n`;
      s += `a > b   → ${a > b}\n`;
      s += `a < b   → ${a < b}\n`;
      s += `a >= 10 → ${a >= 10}\n`;
      s += `a <= 9  → ${a <= 9}\n`;

      s += '\n--- Comparação de strings (ordem lexicográfica) ---\n';
      s += `"abc" < "abd" → ${'abc' < 'abd'}\n`;
      s += `"B" > "A"    → ${'B' > 'A'}\n`;

      exibir('saida-comp', s);
    }

    // ============================================================
    //  4. OPERADORES LÓGICOS
    // ============================================================
    function logicos() {
      let s = '';

      const temCNH    = true;
      const maiorIdade = true;
      const cansado    = false;

      // && → E lógico: ambos precisam ser verdadeiros
      s += `temCNH && maiorIdade → ${temCNH && maiorIdade}  (pode dirigir)\n`;
      s += `temCNH && cansado    → ${temCNH && cansado}  (não deve dirigir)\n`;

      // || → OU lógico: pelo menos um precisa ser verdadeiro
      s += `temCNH || cansado    → ${temCNH || cansado}   (tem CNH ou está cansado)\n`;
      s += `false  || cansado    → ${false  || cansado} (nenhum)\n`;

      // ! → NÃO lógico: inverte o boolean
      s += `!temCNH   → ${!temCNH}  (não tem CNH)\n`;
      s += `!cansado  → ${!cansado}   (não está cansado)\n`;

      // Short-circuit evaluation (curto-circuito)
      // &&: se o primeiro operando for falsy, o segundo NÃO é avaliado
      // ||: se o primeiro operando for truthy, o segundo NÃO é avaliado
      s += '\n--- Short-circuit ---\n';
      const usuario = null;
      const nome = usuario && usuario.nome; // seguro: não lança erro
      s += `usuario = null → usuario && usuario.nome → ${nome}\n`;

      const apelido = null;
      const exibir_ = apelido || 'Visitante'; // valor padrão com ||
      s += `apelido = null → apelido || "Visitante" → "${exibir_}"\n`;

      // ?? (Nullish Coalescing) — ES2020
      // Diferente de ||: só usa o lado direito se o esquerdo for null OU undefined
      // || também usa o lado direito se o esquerdo for 0, "", false (falsy)
      s += '\n--- Nullish Coalescing (??) ---\n';
      const pontos = 0;
      s += `pontos = 0 → pontos || 100  → ${pontos || 100}   (errado: 0 é falsy)\n`;
      s += `pontos = 0 → pontos ?? 100  → ${pontos ?? 100}    (correto: 0 ≠ null/undefined)\n`;

      // ?. (Optional Chaining) — ES2020
      // Acessa propriedade sem lançar erro se o objeto for null/undefined
      s += '\n--- Optional Chaining (?.) ---\n';
      const produto = null;
      s += `produto?.preco → ${produto?.preco} (não lança erro)\n`;
      const carrinho = { total: 150.0 };
      s += `carrinho?.total → ${carrinho?.total}\n`;

      exibir('saida-log', s);
    }

    // ============================================================
    //  5. OPERADOR TERNÁRIO E OUTROS
    // ============================================================
    function outros() {
      let s = '';

      // ----- TERNÁRIO: condição ? seTrue : seFalso -----
      // Atalho para if/else de uma linha
      const nota = 7.5;
      const resultado = nota >= 5 ? 'Aprovado' : 'Reprovado';
      s += `nota = ${nota} → ternário → "${resultado}"\n`;

      // Ternários podem ser aninhados (use com moderação)
      const conceito =
        nota >= 9 ? 'A' :
        nota >= 7 ? 'B' :
        nota >= 5 ? 'C' : 'D';
      s += `Conceito: ${conceito}\n`;

      // ----- typeof -----
      s += '\n--- typeof ---\n';
      s += `typeof 42        → "${typeof 42}"\n`;
      s += `typeof "texto"   → "${typeof 'texto'}"\n`;
      s += `typeof true      → "${typeof true}"\n`;
      s += `typeof undefined → "${typeof undefined}"\n`;
      s += `typeof null      → "${typeof null}" (atenção: bug histórico!)\n`;
      s += `typeof {}        → "${typeof {}}"\n`;
      s += `typeof []        → "${typeof []}"  (use Array.isArray())\n`;
      s += `typeof function(){} → "${typeof function() {}}"\n`;

      // ----- instanceof -----
      s += '\n--- instanceof ---\n';
      const lista = [1, 2, 3];
      s += `[] instanceof Array  → ${lista instanceof Array}\n`;
      s += `[] instanceof Object → ${lista instanceof Object}\n`;

      // ----- in (verifica se chave existe em objeto) -----
      s += '\n--- in ---\n';
      const pessoa = { nome: 'Ana', idade: 22 };
      s += `"nome"   in pessoa → ${'nome'   in pessoa}\n`;
      s += `"salario" in pessoa → ${'salario' in pessoa}\n`;

      exibir('saida-outros', s);
    }
  </script>

</body>
</html>
